openapi: 3.0.3
info:
  title: Order Service API
  version: 1.0.0
  description: >
    HTTP API сервиса заказов на постройку космических кораблей.
    Сервис хранит заказы в памяти и оркестрирует их жизненный цикл
    (создание → оплата → отмена), взаимодействуя с InventoryService
    (расчёт цены) и PaymentService (проведение оплаты) по gRPC.
  license:
    name: MIT
servers:
  - url: http://localhost:8080
    description: Локальный запуск сервиса
security: []
x-ogen:
  target: shared/pkg/openapi/order/v1
  package: orderV1
  clean: true
tags:
  - name: Order
    description: Операции с заказами на постройку космических кораблей
paths:
  /api/v1/orders:
    $ref: ./paths/orders.yaml
  /api/v1/orders/{order_uuid}:
    $ref: ./paths/order_by_uuid.yaml
  /api/v1/orders/{order_uuid}/pay:
    $ref: ./paths/order_pay.yaml
  /api/v1/orders/{order_uuid}/cancel:
    $ref: ./paths/order_cancel.yaml
