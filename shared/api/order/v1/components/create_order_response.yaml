type: object
description: Результат успешного создания заказа
required:
  - order_uuid
  - total_price
properties:
  order_uuid:
    type: string
    format: uuid
    description: UUID созданного заказа
  total_price:
    type: number
    format: double
    description: Итоговая стоимость заказа, рассчитанная по деталям из InventoryService
